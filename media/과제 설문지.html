<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
</head>
<body>
    <h3>설문지</h3>
    <br>
    소프트웨어 기술에 대한 의견을 듣습니다.많은 참여 부탁드립니다.
    <hr>

    <form>
        학년
        <label><input type="radio" name="grade" value="1">1학년</label>
        <label><input type="radio" name="grade" value="2">2학년</label>
        <label><input type="radio" name="grade" value="3">3학년</label>
        <br><br>

         성별
        <label><input type="radio" name="gender" value="1">남성</label>
        <label><input type="radio" name="gender" value="2">여성</label>
        <br><br>

         관심분야
         <select name="interest">
            <option value="1">인공지능</option>
            <option value="2">사물인터넷(lot)</option>
            <option value="3">양자컴퓨터</option>
         </select>
         <br><br>

         진로:
         개발자<input type="checkbox" value="1">
         탁구선수<input type="checkbox" value="2">
         농구선수<input type="checkbox" value="3">
         <br><br>

         남기고 싶은 말
         <textarea cols="40" rows="10">글을 남겨주세요
         </textarea>
         <br>
         <br>

         Copyright 2026 by MYONGJI COLLEGE


    </form>
</body>
</html>
